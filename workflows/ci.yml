name: Continuous Integration (CI)

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  test-and-quality:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Requerido por SonarCloud para analizar el historial de Git

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run Unit Tests with Coverage Enforcer
      run: |
        # Ejecuta pruebas y genera los reportes xml y html
        pytest --cov=src --cov-report=xml --cov-report=html tests/
        
    - name: Enforce Test Coverage Threshold (>= 85%)
      run: |
        # Extrae el porcentaje total de cobertura de la consola y evalúa el mínimo
        COVERAGE=$(coverage report | grep TOTAL | awk '{print $4}' | sed 's/%//')
        echo "Total Code Coverage: $COVERAGE%"
        if [ "$COVERAGE" -lt 85 ]; then
          echo "❌ ERROR: La cobertura de código es de $COVERAGE%, la cual es inferior al umbral mínimo requerido del 85%."
          exit 1
        fi
        echo "✅ Cobertura aprobada con éxito."

    - name: Publish Coverage Report as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: html-coverage-report
        path: htmlcov/
        retention-days: 7

    - name: SonarCloud Scan (Quality Gate)
      uses: Sonarsource/sonarcloud-github-action@v3.0.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}